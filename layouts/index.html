{{ define "main" }}

<link rel="stylesheet" href="/css/custom.css">

<div class="trispective-hero">
    <h1 class="trispective-title">TRISPECTIVE</h1>
    <p class="trispective-author">By Rana</p>
</div>

<div class="post-list-container">
    {{ range (where .Site.RegularPages "Section" "post") }}
        <div class="post-card">
            <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
            <div class="post-summary">{{ .Summary | truncate 150 }}</div>
        </div>
    {{ end }}
</div>

<div id="ranaBackToTop" class="rana-back-to-top">
    &#8593;
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let lastScrollTop = 0;
    
    // Grabs the main theme navbar and our new button
    const navbar = document.querySelector(".navbar.fixed-top"); 
    const backToTopBtn = document.getElementById("ranaBackToTop");

    window.addEventListener("scroll", function() {
        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

        // 1. SMART NAVBAR LOGIC
        if (navbar) {
            if (scrollTop > lastScrollTop && scrollTop > 100) {
                // User is scrolling down: Hide Navbar
                navbar.classList.add("nav-hidden");
            } else {
                // User is scrolling up: Show Navbar
                navbar.classList.remove("nav-hidden");
            }
        }
        lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; // Prevents mobile bouncing glitches

        // 2. BACK TO TOP BUTTON LOGIC
        if (scrollTop > 400) {
            // Show button after scrolling down 400px
            backToTopBtn.classList.add("show-btn");
        } else {
            // Hide button if near the top
            backToTopBtn.classList.remove("show-btn");
        }
    });

    // 3. CLICK TO SMOOTH SCROLL LOGIC
    backToTopBtn.addEventListener("click", function() {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });
});
</script>
{{ end }}

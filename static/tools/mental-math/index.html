<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Number Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- नियॉन थीम और कस्टम स्टाइल्स --- */
        :root {
            --bg-color: #000000;
            --neon-purple: #9333ea; /* purple-600 */
            --neon-green: #10b981;  /* emerald-500 */
            --text-color: #e5e7eb; /* gray-200 */
            --tile-bg: #1f2937;    /* gray-800 */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .neon-text-purple {
            color: var(--neon-purple);
            text-shadow: 0 0 5px var(--neon-purple), 0 0 10px var(--neon-purple);
        }

        .neon-text-green {
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green), 0 0 10px var(--neon-green);
        }
        
        .neon-border {
            border: 2px solid var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple), inset 0 0 10px var(--neon-purple);
        }

        .neon-button {
            background-color: transparent;
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            text-shadow: 0 0 2px var(--neon-purple);
            transition: all 0.3s ease;
            box-shadow: 0 0 5px var(--neon-purple), inset 0 0 5px var(--neon-purple);
        }

        .neon-button:hover, .neon-button:focus {
            background-color: var(--neon-purple);
            color: white;
            box-shadow: 0 0 20px var(--neon-purple), 0 0 30px var(--neon-purple);
        }
        
        /* --- गेम की टाइल्स का स्टाइल --- */
        .tile {
            background-color: var(--tile-bg);
            border: 1px solid #4b5563; /* gray-600 */
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            animation: tile-appear 0.5s ease backwards;
            will-change: transform;
        }

        .tile.selected {
            transform: scale(1.1);
            background-color: var(--neon-purple);
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
        }
        
        /* --- एनिमेशन्स --- */
        .tile.matched {
            animation: tile-match 0.5s ease forwards;
        }

        .tile.shake {
            animation: shake 0.5s ease;
        }

        #score-value.pop {
            animation: pop-score 0.4s ease;
        }

        @keyframes tile-appear {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        @keyframes tile-match {
            from { transform: scale(1.1) rotate(0deg); opacity: 1; }
            to { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) scale(1.1); }
            20%, 60% { transform: translateX(-6px) scale(1.1); }
            40%, 80% { transform: translateX(6px) scale(1.1); }
        }

        @keyframes pop-score {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        /* स्क्रीन ट्रांजीशन के लिए */
        .screen {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .screen.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            position: absolute;
        }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-2">

    <div class="w-full max-w-sm mx-auto">
        <!-- मोड चुनने की स्क्रीन -->
        <div id="mode-selection-screen" class="screen flex flex-col items-center justify-center space-y-6 p-4">
            <h1 class="text-4xl font-bold neon-text-purple mb-6">Select Mode</h1>
            <button data-difficulty="beginner" class="mode-btn neon-button w-full py-3 text-xl font-bold rounded-lg">Beginner</button>
            <button data-difficulty="middle" class="mode-btn neon-button w-full py-3 text-xl font-bold rounded-lg">Middle</button>
            <button data-difficulty="hard" class="mode-btn neon-button w-full py-3 text-xl font-bold rounded-lg">Hard</button>
        </div>

        <!-- गेम की मुख्य स्क्रीन -->
        <div id="game-screen" class="screen hidden flex-col w-full h-full">
            <div class="bg-gray-900/50 backdrop-blur-sm rounded-2xl shadow-2xl p-4 neon-border flex flex-col h-full">
                <!-- हेडर और जानकारी -->
                <header class="flex justify-between items-center mb-4">
                     <button id="back-btn" class="text-gray-400 hover:text-white transition">&larr; Change Mode</button>
                    <div>
                        <span class="text-sm text-gray-400">LEVEL</span>
                        <p id="level" class="text-2xl font-bold text-center">1</p>
                    </div>
                </header>

                <!-- स्कोर और टारगेट -->
                <div class="text-center mb-4 p-3 bg-black/30 rounded-lg">
                    <p class="text-sm text-gray-400">SCORE</p>
                    <p id="score" class="text-4xl font-bold neon-text-green transition-all duration-300">
                        <span id="score-value">0</span>
                    </p>
                    <p class="mt-3 text-lg">Find numbers that sum to <strong id="target-sum-text" class="text-2xl neon-text-purple">100</strong></p>
                </div>
                
                <!-- गेम ग्रिड -->
                <div id="game-container" class="relative flex-grow">
                    <div id="game-grid" class="grid grid-cols-5 gap-2 w-full mx-auto">
                        <!-- Tiles will be generated here by JavaScript -->
                    </div>
                    <!-- लेवल पूरा होने पर मैसेज -->
                    <div id="win-message" class="absolute inset-0 bg-black/80 flex items-center justify-center opacity-0 pointer-events-none rounded-lg">
                        <h2 class="text-3xl font-bold neon-text-green">Level Complete!</h2>
                    </div>
                </div>

                <!-- रीस्टार्ट बटन -->
                <div class="mt-4">
                    <button id="restart-btn" class="neon-button w-full py-3 text-lg font-semibold rounded-lg">Restart Level</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DOM एलिमेंट्स ---
        const modeScreen = document.getElementById('mode-selection-screen');
        const gameScreen = document.getElementById('game-screen');
        const modeButtons = document.querySelectorAll('.mode-btn');
        const backBtn = document.getElementById('back-btn');

        const gameGrid = document.getElementById('game-grid');
        const scoreValueEl = document.getElementById('score-value');
        const levelEl = document.getElementById('level');
        const restartBtn = document.getElementById('restart-btn');
        const targetSumText = document.getElementById('target-sum-text');
        const winMessage = document.getElementById('win-message');
        
        // --- गेम की सेटिंग्स ---
        const GRID_SIZE = 20; // 5x4 ग्रिड
        let difficultySettings = {
            beginner: { minSum: 2, maxSum: 10, multiplier: 10 },    // 20 to 100
            middle: { minSum: 11, maxSum: 100, multiplier: 10 },   // 110 to 1000
            hard: { minSum: 101, maxSum: 1000, multiplier: 10 } // 1010 to 10000
        };
        
        // --- गेम की स्थिति (State) ---
        let score = 0;
        let level = 1;
        let currentDifficulty = 'beginner';
        let targetSum = 100;
        let firstSelection = null;
        let lockBoard = false;

        // --- गेम का मुख्य लॉजिक ---

        function showScreen(screenToShow) {
            modeScreen.classList.add('hidden');
            gameScreen.classList.add('hidden');
            screenToShow.classList.remove('hidden');
        }

        function startGame(difficulty) {
            currentDifficulty = difficulty;
            score = 0;
            level = 1;
            showScreen(gameScreen);
            generateLevel();
        }

        function generateLevel() {
            gameGrid.innerHTML = '';
            firstSelection = null;
            lockBoard = false;
            winMessage.classList.add('opacity-0', 'pointer-events-none');
            
            targetSum = generateTargetSum(currentDifficulty);
            const numbers = generateNumbers(targetSum, GRID_SIZE);
            const shuffledNumbers = shuffleArray(numbers);
            
            shuffledNumbers.forEach((num, index) => {
                const tile = document.createElement('div');
                tile.classList.add('tile', 'flex', 'items-center', 'justify-center', 'text-lg', 'font-bold', 'rounded-md', 'cursor-pointer', 'aspect-square');
                tile.dataset.value = num;
                tile.textContent = num;
                tile.style.animationDelay = `${index * 0.02}s`;
                tile.addEventListener('click', onTileClick);
                gameGrid.appendChild(tile);
            });
            updateDisplay();
        }
        
        function generateTargetSum(difficulty) {
            const settings = difficultySettings[difficulty];
            const baseSum = Math.floor(Math.random() * (settings.maxSum - settings.minSum + 1)) + settings.minSum;
            return baseSum * settings.multiplier;
        }

        function generateNumbers(sum, count) {
            const pairs = [];
            const usedNumbers = new Set();

            while (pairs.length < count / 2) {
                const num1 = Math.floor(Math.random() * (sum - 1)) + 1;
                const num2 = sum - num1;
                
                if (num1 !== num2 && !usedNumbers.has(num1) && !usedNumbers.has(num2)) {
                    pairs.push([num1, num2]);
                    usedNumbers.add(num1);
                    usedNumbers.add(num2);
                }
            }
            return pairs.flat();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function onTileClick(event) {
            const clickedTile = event.target;
            if (lockBoard || clickedTile === firstSelection || clickedTile.classList.contains('matched')) return;
            
            clickedTile.classList.add('selected');

            if (!firstSelection) {
                firstSelection = clickedTile;
            } else {
                lockBoard = true;
                checkForMatch(clickedTile);
            }
        }

        function checkForMatch(secondTile) {
            const val1 = parseInt(firstSelection.dataset.value);
            const val2 = parseInt(secondTile.dataset.value);

            if (val1 + val2 === targetSum) {
                // सही जोड़ी
                score += 10;
                firstSelection.classList.remove('selected');
                secondTile.classList.remove('selected');
                firstSelection.classList.add('matched');
                secondTile.classList.add('matched');
                
                updateDisplay(true); // स्कोर पॉप एनिमेशन के साथ अपडेट करें
                
                if (document.querySelectorAll('.tile:not(.matched)').length === 0) {
                   setTimeout(() => {
                        winMessage.classList.remove('opacity-0', 'pointer-events-none');
                        setTimeout(nextLevel, 1500);
                   }, 500);
                }
                setTimeout(resetSelection, 200);
            } else {
                // गलत जोड़ी
                firstSelection.classList.add('shake');
                secondTile.classList.add('shake');
                
                setTimeout(() => {
                    firstSelection.classList.remove('selected', 'shake');
                    secondTile.classList.remove('selected', 'shake');
                    resetSelection();
                }, 500);
            }
        }

        function nextLevel() {
            level++;
            generateLevel();
        }

        function resetSelection() {
            firstSelection = null;
            lockBoard = false;
        }

        function updateDisplay(popScore = false) {
            scoreValueEl.textContent = score;
            if(popScore) {
                scoreValueEl.classList.add('pop');
                scoreValueEl.addEventListener('animationend', () => scoreValueEl.classList.remove('pop'), { once: true });
            }
            levelEl.textContent = level;
            targetSumText.textContent = targetSum;
        }

        // --- इवेंट लिस्टनर्स ---
        modeButtons.forEach(button => {
            button.addEventListener('click', () => {
                startGame(button.dataset.difficulty);
            });
        });

        backBtn.addEventListener('click', () => {
            showScreen(modeScreen);
        });

        restartBtn.addEventListener('click', generateLevel);

        // --- इनिशियलाइज़ेशन ---
        showScreen(modeScreen);

    </script>
</body>
</html>

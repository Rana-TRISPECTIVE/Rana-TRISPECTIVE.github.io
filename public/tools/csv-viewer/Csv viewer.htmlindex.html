<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Viewer - Neon Advanced</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        /* --- Base Styles & Neon Theme --- */
        :root {
            --bg-color: #0a0118;
            --header-bg-color: #13022e;
            --text-color: #e0e0e0;
            --primary-color: #a627d8;
            --accent-color: #00f5d4;
            --border-color: #3a0ca3;
            --glow-color-primary: rgba(166, 39, 216, 0.6);
            --glow-color-accent: rgba(0, 245, 212, 0.6);
            --hover-bg-color: rgba(166, 39, 216, 0.1);
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        body {
            padding: 2rem 1rem;
        }

        /* --- Layout & Containers --- */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .card {
            background-color: var(--header-bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            animation: fadeIn 0.5s ease-in-out;
            box-shadow: 0 0 15px var(--glow-color-primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Header --- */
        .app-header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .app-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--glow-color-primary), 0 0 20px var(--glow-color-primary);
        }

        .app-header p {
            font-size: 1rem;
            color: #aaa;
            max-width: 600px;
            margin: 0.5rem auto 0;
        }

        /* --- Input & Controls --- */
        .input-section .control-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: end;
        }
        
        .csv-textarea {
            width: 100%;
            height: 200px;
            background-color: #0c011f;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            resize: vertical;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .csv-textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px var(--glow-color-accent);
        }

        .button-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 8px var(--glow-color-primary);
        }

        .btn:hover {
            background-color: var(--accent-color);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 0 15px var(--glow-color-accent);
        }
        
        .btn:disabled {
            background-color: #555;
            color: #999;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-icon {
            padding: 0.6rem;
        }

        .btn-icon svg {
            width: 18px;
            height: 18px;
        }
        
        .zoom-controls {
            background-color: #0c011f;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.25rem;
        }

        .zoom-controls .btn {
            background: none;
            color: var(--text-color);
            box-shadow: none;
        }
        .zoom-controls .btn:hover {
            background-color: var(--hover-bg-color);
        }
        
        #zoom-display {
            font-weight: 600;
            font-family: var(--font-mono);
            min-width: 50px;
            text-align: center;
        }

        /* --- Viewer Controls & Advanced Filters --- */
        .viewer-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .control-group label {
            font-size: 0.8rem;
            color: #aaa;
            font-weight: 500;
        }

        .control-group select, .control-group input {
            width: 100%;
            background-color: #0c011f;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.6rem;
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 0.9rem;
        }
        
        #advancedFilterControls {
            grid-column: 1 / -1; /* Span all columns */
            margin-top: 1rem;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #0c011f;
        }
        
        .categorical-filter {
            max-height: 150px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.5rem;
        }
        
        .categorical-filter label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        
        .numeric-filter {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .numeric-filter input {
            width: 100px;
        }

        /* --- Table Viewer --- */
        .table-container {
            width: 100%;
            overflow: auto; /* Enables both horizontal and vertical scrolling */
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
            font-size: 0.9rem;
            transition: transform 0.3s ease-in-out;
            transform-origin: top left;
        }

        .data-table th, .data-table td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .data-table thead th {
            background-color: #1a023a;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
        }
        
        .data-table thead th .th-content {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .drag-handle {
            cursor: move;
            opacity: 0.5;
        }

        .sort-indicator {
            font-size: 0.7rem;
            opacity: 0.7;
            color: var(--accent-color);
        }

        .data-table tbody tr:hover {
            background-color: var(--hover-bg-color);
        }

        /* --- Status & Pagination --- */
        .status-pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.9rem;
            color: #aaa;
        }
        
        .status-bar {
            display: flex;
            gap: 1.5rem;
        }
        
        .status-bar span {
            font-family: var(--font-mono);
        }

        /* --- Utility & Hidden --- */
        .hidden {
            display: none !important;
        }

        /* --- Responsive Design --- */
        @media (max-width: 768px) {
            body {
                padding: 1rem 0.5rem;
            }
            .app-header h1 {
                font-size: 2rem;
            }
            .input-section .control-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="app-header">
            <h1>Advanced CSV Viewer</h1>
        </header>

        <!-- Input Section -->
        <section id="inputSection" class="card">
            <div class="control-grid">
                <textarea id="csvInput" class="csv-textarea" placeholder="ID,FirstName,LastName,Age,Department,Salary,HireDate,EmployeeID,Email,PhoneNumber,Address

                <div class="button-group">
                     <div class="zoom-controls button-group">
                        <button id="zoomOutBtn" class="btn btn-icon" aria-label="Zoom Out">-</button>
                        <span id="zoom-display">100%</span>

                        </button>
                    </div>
                    <button id="parseBtn" class="btn">

                        view
                    </button>
                </div>
            </div>
            <div id="errorMessage" class="hidden" style="color: #f44336; margin-top: 1rem;"></div>
        </section>

        <!-- Viewer Section -->
        <section id="viewerSection" class="card hidden">
            <!-- Viewer Controls -->
            <div class="viewer-controls">
                <div class="control-group">
                    <label for="delimiterSelect">Delimiter</label>
                    <select id="delimiterSelect">
                        <option value="auto">Auto-detect</option>
                        <option value=",">Comma (,)</option>
                        <option value=";">Semicolon (;)</option>
                        <option value="\t">Tab</option>
                        <option value="|">Pipe (|)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="rowsPerPageSelect">Rows प्रति page</label>
                    <select id="rowsPerPageSelect">
                        <option value="10">10</option>
                        <option value="25" selected>25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="filterColumnSelect">Filter Column</label>
                    <select id="filterColumnSelect">
                        <option value="all">Sabhi Columns</option>
                    </select>
                </div>
                <div id="globalSearchContainer" class="control-group">
                     <label for="searchInput">Search Karein</label>
                     <input type="text" id="searchInput" placeholder="Data search karein...">
                </div>
                 <div id="advancedFilterControls" class="hidden"></div>
            </div>

            <!-- Table Container -->
            <div id="tableContainer" class="table-container" style="margin-top: 1.5rem;">
                <table id="dataTable" class="data-table">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
             <div id="noResultsMessage" class="hidden" style="text-align: center; padding: 2rem; color: #aaa;">Koi matching records nahi mila.</div>

            <!-- Status & Pagination -->
            <div class="status-pagination" style="margin-top: 1.5rem;">
                <div id="statusBar" class="status-bar"></div>
                <div id="pagination" class="button-group">
                    <button id="prevPageBtn" class="btn">Pichla</button>
                    <span id="pageInfo"></span>
                    <button id="nextPageBtn" class="btn">Agla</button>
                </div>
            </div>
        </section>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- DOM Element References ---
        const csvInput = document.getElementById('csvInput');
        const parseBtn = document.getElementById('parseBtn');
        const errorMessage = document.getElementById('errorMessage');
        const viewerSection = document.getElementById('viewerSection');
        const delimiterSelect = document.getElementById('delimiterSelect');
        const rowsPerPageSelect = document.getElementById('rowsPerPageSelect');
        const filterColumnSelect = document.getElementById('filterColumnSelect');
        const searchInput = document.getElementById('searchInput');
        const globalSearchContainer = document.getElementById('globalSearchContainer');
        const advancedFilterControls = document.getElementById('advancedFilterControls');
        const tableContainer = document.getElementById('tableContainer');
        const dataTable = document.getElementById('dataTable');
        const tableHead = dataTable.querySelector('thead');
        const tableBody = dataTable.querySelector('tbody');
        const noResultsMessage = document.getElementById('noResultsMessage');
        const statusBar = document.getElementById('statusBar');
        const pageInfo = document.getElementById('pageInfo');
        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomResetBtn = document.getElementById('zoomResetBtn');
        const zoomDisplay = document.getElementById('zoom-display');

        // --- Application State ---
        let fullData = [];
        let headers = [];
        let columnOrder = [];
        let filteredData = [];
        let currentPage = 1;
        let rowsPerPage = 25;
        let sortState = { columnIndex: null, direction: 'asc' };
        let currentZoom = 1.0;
        let sortableInstance = null;
        let advancedFilterState = {};

        // --- Core Functions ---

        const parseCSV = () => {
            const csvText = csvInput.value.trim();
            if (!csvText) {
                showError("Pahle kuch CSV data paste karein.");
                return;
            }

            hideError();
            parseBtn.disabled = true;
            parseBtn.textContent = 'Processing...';

            const delimiter = delimiterSelect.value === 'auto' ? '' : delimiterSelect.value;

            Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true,
                delimiter: delimiter,
                complete: (results) => {
                    if (results.errors.length > 0) {
                        showError(`Parsing Error: ${results.errors[0].message}`);
                        resetApp();
                        return;
                    }
                    
                    headers = results.meta.fields;
                    fullData = results.data;
                    columnOrder = headers.map((_, index) => index);
                    
                    resetStateForNewData();
                    populateFilterColumnSelect();
                    updateView();
                    
                    viewerSection.classList.remove('hidden');
                    parseBtn.disabled = false;
                    parseBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg> Parse Karein`;
                },
                error: (error) => {
                    showError(`An unexpected error occurred: ${error.message}`);
                    resetApp();
                }
            });
        };
        
        const resetStateForNewData = () => {
            currentPage = 1;
            sortState = { columnIndex: null, direction: 'asc' };
            searchInput.value = '';
            advancedFilterState = {};
            filterColumnSelect.value = 'all';
            handleFilterColumnChange();
        };

        const applyFilters = () => {
            const searchTerm = searchInput.value.toLowerCase();
            const filterColumn = filterColumnSelect.value;
            
            return fullData.filter(row => {
                // Global search
                if (filterColumn === 'all') {
                    if (!searchTerm) return true;
                    return Object.values(row).some(val => String(val).toLowerCase().includes(searchTerm));
                }

                // Advanced filters
                const filter = advancedFilterState[filterColumn];
                if (!filter) return true;

                const rowValue = row[filterColumn];

                if (filter.type === 'categorical') {
                    if (filter.selected.length === 0) return true; // If nothing selected, show all
                    return filter.selected.includes(String(rowValue));
                }

                if (filter.type === 'numeric') {
                    const numValue = parseFloat(rowValue);
                    if (isNaN(numValue)) return false;

                    const min = filter.min !== '' ? parseFloat(filter.min) : -Infinity;
                    const max = filter.max !== '' ? parseFloat(filter.max) : Infinity;

                    return numValue >= min && numValue <= max;
                }
                
                return true;
            });
        };

        const updateView = () => {
            if (fullData.length === 0) return;
            
            // 1. Filter data
            filteredData = applyFilters();

            // 2. Sort data
            if (sortState.columnIndex !== null) {
                const key = headers[sortState.columnIndex];
                const direction = sortState.direction === 'asc' ? 1 : -1;

                filteredData.sort((a, b) => {
                    const valA = a[key];
                    const valB = b[key];
                    
                    const isNumeric = !isNaN(parseFloat(valA)) && isFinite(valA) && !isNaN(parseFloat(valB)) && isFinite(valB);
                    
                    if (isNumeric) {
                        return (parseFloat(valA) - parseFloat(valB)) * direction;
                    } else {
                        return String(valA).localeCompare(String(valB)) * direction;
                    }
                });
            }
            
            // 3. Render
            renderTable();
            updateStatus();
            updatePagination();
        };

        const renderTable = () => {
            let headerHtml = '<tr>';
            columnOrder.forEach(colIndex => {
                const headerText = headers[colIndex];
                let sortIndicator = '';
                if (sortState.columnIndex === colIndex) {
                    sortIndicator = sortState.direction === 'asc' ? '▲' : '▼';
                }
                headerHtml += `<th data-col-index="${colIndex}">
                    <div class="th-content">
                        <span class="drag-handle" aria-label="Drag to reorder">⠿</span>
                        <span>${headerText}</span>
                        <span class="sort-indicator">${sortIndicator}</span>
                    </div>
                </th>`;
            });
            headerHtml += '</tr>';
            tableHead.innerHTML = headerHtml;

            tableHead.querySelectorAll('th').forEach(th => {
                th.addEventListener('click', (e) => {
                    if (e.target.classList.contains('drag-handle')) return;
                    handleSort(parseInt(th.dataset.colIndex));
                });
            });
            
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(tableHead.querySelector('tr'), {
                animation: 150,
                handle: '.drag-handle',
                onEnd: (evt) => {
                    const newOrder = Array.from(evt.target.children).map(th => parseInt(th.dataset.colIndex));
                    columnOrder = newOrder;
                    renderTable(); // Only re-render table, not full updateView
                }
            });

            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = startIndex + rowsPerPage;
            const pageData = filteredData.slice(startIndex, endIndex);

            if (pageData.length === 0) {
                tableBody.innerHTML = '';
                tableContainer.classList.add('hidden');
                noResultsMessage.classList.remove('hidden');
            } else {
                tableContainer.classList.remove('hidden');
                noResultsMessage.classList.add('hidden');
                let bodyHtml = '';
                pageData.forEach(row => {
                    bodyHtml += '<tr>';
                    columnOrder.forEach(colIndex => {
                        const key = headers[colIndex];
                        bodyHtml += `<td title="${row[key]}">${row[key]}</td>`;
                    });
                    bodyHtml += '</tr>';
                });
                tableBody.innerHTML = bodyHtml;
            }
        };
        
        const handleSort = (columnIndex) => {
            if (sortState.columnIndex === columnIndex) {
                sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortState.columnIndex = columnIndex;
                sortState.direction = 'asc';
            }
            currentPage = 1;
            updateView();
        };

        const updateStatus = () => {
            const totalRows = fullData.length;
            const displayedRows = filteredData.length;
            const delimiter = Papa.parse(csvInput.value.trim(), { preview: 1 }).meta.delimiter;

            statusBar.innerHTML = `
                <span>Rows: ${displayedRows} of ${totalRows}</span>
                <span>Columns: ${headers.length}</span>
                <span>Delimiter: ${delimiter || 'N/A'}</span>
            `;
        };

        const updatePagination = () => {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            pageInfo.textContent = `Page ${currentPage} of ${totalPages || 1}`;
            prevPageBtn.disabled = currentPage === 1;
            nextPageBtn.disabled = currentPage === totalPages || totalPages === 0;
        };
        
        const changePage = (direction) => {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            const newPage = currentPage + direction;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderTable();
                updatePagination();
            }
        };
        
        const populateFilterColumnSelect = () => {
            filterColumnSelect.innerHTML = '<option value="all">Sabhi Columns</option>';
            headers.forEach(header => {
                const option = document.createElement('option');
                option.value = header;
                option.textContent = header;
                filterColumnSelect.appendChild(option);
            });
        };

        const handleFilterColumnChange = () => {
            const column = filterColumnSelect.value;
            advancedFilterControls.innerHTML = '';
            
            if (column === 'all') {
                globalSearchContainer.classList.remove('hidden');
                advancedFilterControls.classList.add('hidden');
                return;
            }

            globalSearchContainer.classList.add('hidden');
            advancedFilterControls.classList.remove('hidden');
            
            // Determine column type (numeric or categorical)
            let numericCount = 0;
            const values = fullData.map(row => row[column]).filter(v => v != null && v !== '');
            values.forEach(val => {
                if (!isNaN(parseFloat(val)) && isFinite(val)) {
                    numericCount++;
                }
            });

            // Heuristic: if > 70% are numbers, treat as numeric
            const isNumeric = (numericCount / values.length) > 0.7;

            if (isNumeric) {
                createNumericFilter(column);
            } else {
                createCategoricalFilter(column);
            }
        };

        const createCategoricalFilter = (column) => {
            const uniqueValues = [...new Set(fullData.map(row => row[column]))].sort();
            
            if (!advancedFilterState[column]) {
                advancedFilterState[column] = { type: 'categorical', selected: [] };
            }
            
            let checkboxesHTML = '<div class="categorical-filter">';
            uniqueValues.forEach(value => {
                const isChecked = advancedFilterState[column].selected.includes(String(value));
                checkboxesHTML += `
                    <label>
                        <input type="checkbox" value="${value}" ${isChecked ? 'checked' : ''}>
                        ${value}
                    </label>
                `;
            });
            checkboxesHTML += '</div>';
            advancedFilterControls.innerHTML = checkboxesHTML;

            advancedFilterControls.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', () => {
                    const selected = Array.from(advancedFilterControls.querySelectorAll('input:checked')).map(cb => cb.value);
                    advancedFilterState[column].selected = selected;
                    currentPage = 1;
                    updateView();
                });
            });
        };

        const createNumericFilter = (column) => {
            if (!advancedFilterState[column]) {
                advancedFilterState[column] = { type: 'numeric', min: '', max: '' };
            }
            
            const state = advancedFilterState[column];
            advancedFilterControls.innerHTML = `
                <div class="numeric-filter">
                    <input type="number" id="minFilter" placeholder="Min" value="${state.min}">
                    <span>-</span>
                    <input type="number" id="maxFilter" placeholder="Max" value="${state.max}">
                </div>
            `;
            
            const minInput = document.getElementById('minFilter');
            const maxInput = document.getElementById('maxFilter');

            [minInput, maxInput].forEach(input => {
                input.addEventListener('input', () => {
                    advancedFilterState[column].min = minInput.value;
                    advancedFilterState[column].max = maxInput.value;
                    currentPage = 1;
                    updateView();
                });
            });
        };

        const applyZoom = () => {
            dataTable.style.transform = `scale(${currentZoom})`;
            zoomDisplay.textContent = `${Math.round(currentZoom * 100)}%`;
        };

        const zoomIn = () => {
            if (currentZoom < 2.0) {
                currentZoom = Math.min(2.0, currentZoom + 0.1);
                applyZoom();
            }
        };

        const zoomOut = () => {
            if (currentZoom > 0.5) {
                currentZoom = Math.max(0.5, currentZoom - 0.1);
                applyZoom();
            }
        };

        const resetZoom = () => {
            currentZoom = 1.0;
            applyZoom();
        };
        
        const handleKeyDown = (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch (e.key) {
                    case '=': case '+': e.preventDefault(); zoomIn(); break;
                    case '-': e.preventDefault(); zoomOut(); break;
                    case '0': e.preventDefault(); resetZoom(); break;
                }
            }
        };

        const showError = (message) => {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
        };

        const hideError = () => errorMessage.classList.add('hidden');
        
        const resetApp = () => {
            parseBtn.disabled = false;
            parseBtn.innerHTML = `<svg ...> Parse Karein`;
            viewerSection.classList.add('hidden');
            fullData = [];
            headers = [];
        };

        // --- Event Listeners ---
        parseBtn.addEventListener('click', parseCSV);
        delimiterSelect.addEventListener('change', parseCSV);
        rowsPerPageSelect.addEventListener('change', (e) => {
            rowsPerPage = parseInt(e.target.value, 10);
            currentPage = 1;
            updateView();
        });
        searchInput.addEventListener('input', () => {
            currentPage = 1;
            updateView();
        });
        filterColumnSelect.addEventListener('change', handleFilterColumnChange);
        prevPageBtn.addEventListener('click', () => changePage(-1));
        nextPageBtn.addEventListener('click', () => changePage(1));
        zoomInBtn.addEventListener('click', zoomIn);
        zoomOutBtn.addEventListener('click', zoomOut);
        zoomResetBtn.addEventListener('click', resetZoom);
        document.addEventListener('keydown', handleKeyDown);

    });
    </script>
</body>
</html>
